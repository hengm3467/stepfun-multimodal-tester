<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StepFun 多模态接口测试器 (OpenAI 兼容格式)</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <p class="eyebrow">StepFun API 实验室</p>
          <h1>多模态对话框测试器</h1>
          <p class="lede">基于 OpenAI Chat Completions API 格式，支持文本、图片和视频的多模态请求。</p>
        </div>
        <div class="status-card" id="healthCard">正在检查运行环境...</div>
      </section>

      <section class="workspace">
        <form class="composer panel" id="testForm">
          <div class="row two">
            <label>
              接口
              <select id="endpoint">
                <option value="chat_completions">Chat Completion (OpenAI 兼容)</option>
                <option value="messages">Messages (Anthropic 风格)</option>
              </select>
            </label>
            <label>
              模型
              <input id="model" placeholder="请输入模型名称" required />
            </label>
          </div>

          <label>
            StepFun API Key
            <input id="apiKey" type="password" autocomplete="off" placeholder="粘贴 API Key；本地运行时也可留空使用服务端环境变量" />
            <span class="field-hint">仅保存在当前浏览器会话中，用于本次请求。本地服务端也支持读取 <code>STEPFUN_API_KEY</code>。</span>
          </label>

          <div class="format-info">
            <p><strong>API 格式：</strong>遵循 <a href="https://platform.openai.com/docs/api-reference/chat/create" target="_blank">OpenAI Chat Completions API</a> 标准</p>
            <p><strong>扩展支持：</strong>视频 URL (<code class="inline-code">video_url</code>) 为 StepFun 扩展字段</p>
          </div>

          <label>
            系统提示词
            <textarea id="system" rows="2">你是一个多模态测试助手。请简洁回答，并准确描述视觉内容。</textarea>
          </label>

          <label>
            用户提示词
            <textarea id="prompt" rows="5" placeholder="描述图片、总结视频，或针对附件提问。">请描述视觉内容，并指出其中可读的文字。</textarea>
          </label>

          <div class="row three">
            <label>
              温度
              <input id="temperature" type="number" min="0" max="2" step="0.1" value="0.2" />
            </label>
            <label>
              最大输出 token
              <input id="maxTokens" type="number" min="1" max="8192" step="1" value="1024" />
            </label>
            <label class="checkline">
              <input id="stream" type="checkbox" />
              流式输出
            </label>
          </div>

          <div class="attachment-tools">
            <button type="button" data-add="image_url">+ 图片 URL</button>
            <button type="button" data-add="image_base64">+ 上传图片</button>
            <button type="button" data-add="video_url">+ 视频 URL <span class="ext">扩展</span></button>
          </div>
          <p class="field-hint">视频当前按 URL 方式传入；请先将 MP4 文件托管到可访问的 HTTPS 地址，再粘贴 URL。</p>

          <div id="attachments" class="attachments"></div>
          <div id="warnings" class="warnings"></div>

          <button class="send" type="submit">发送测试请求</button>
        </form>

        <aside class="panel results">
          <div class="result-header">
            <div>
              <p class="eyebrow">诊断信息</p>
              <h2>请求与响应</h2>
            </div>
            <button type="button" id="copyCurl">复制 curl</button>
          </div>

          <div class="metrics" id="metrics">
            <span>空闲</span>
          </div>

          <label>
            助手回复
            <textarea id="assistantText" rows="5" readonly placeholder="模型回复会显示在这里。"></textarea>
          </label>

          <details open>
            <summary>生成的请求 JSON</summary>
            <pre id="requestJson">{}</pre>
          </details>

          <details open>
            <summary>原始响应 JSON</summary>
            <pre id="responseJson">{}</pre>
          </details>
        </aside>
      </section>

      <section class="panel history-panel">
        <div class="result-header">
          <div>
            <p class="eyebrow">测试记录</p>
            <h2>历史记录</h2>
          </div>
          <button id="clearHistory" type="button">清空</button>
        </div>
        <div id="history" class="history empty">暂无测试记录。</div>
      </section>
    </main>

    <template id="attachmentTemplate">
      <article class="attachment">
        <div class="attachment-head">
          <strong></strong>
          <button type="button" class="remove">移除</button>
        </div>
        <div class="attachment-body"></div>
      </article>
    </template>

    <script src="app.js" type="module"></script>
  </body>
</html>
